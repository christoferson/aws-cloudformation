AWSTemplateFormatVersion: "2010-09-09"
Description: Lambda Function URL with IAM Auth - Bedrock Converse Stream

Parameters:
  BedrockModelId:
    Type: String
    Default: "global.anthropic.claude-sonnet-4-5-20250929-v1:0"
    Description: Bedrock model ID to use for converse API

Resources:

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: "Lambda with Bedrock Converse Stream API"
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: index.handler
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      MemorySize: 512
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          from botocore.exceptions import ClientError

          bedrock_runtime = boto3.client('bedrock-runtime')

          def handler(event, context):
              """
              Lambda function URL handler for Bedrock Converse Stream API
              Expects JSON body with 'messages' array and optional 'system' prompt
              """
              try:
                  # Parse request body
                  if 'body' in event:
                      body = json.loads(event['body']) if isinstance(event['body'], str) else event['body']
                  else:
                      body = event

                  messages = body.get('messages', [])
                  system_prompt = body.get('system', '')
                  max_tokens = body.get('max_tokens', 1024)
                  temperature = body.get('temperature', 1.0)

                  if not messages:
                      return {
                          'statusCode': 400,
                          'headers': {'Content-Type': 'application/json'},
                          'body': json.dumps({'error': 'messages array is required'})
                      }

                  model_id = os.environ.get('BEDROCK_MODEL_ID')

                  # Prepare converse stream request
                  request_params = {
                      'modelId': model_id,
                      'messages': messages,
                      'inferenceConfig': {
                          'maxTokens': max_tokens,
                          'temperature': temperature
                      }
                  }

                  if system_prompt:
                      request_params['system'] = [{'text': system_prompt}]

                  # Call Bedrock Converse Stream API
                  response = bedrock_runtime.converse_stream(**request_params)

                  # Process streaming response
                  full_response = ""
                  stop_reason = None

                  stream = response.get('stream')
                  if stream:
                      for event in stream:
                          if 'contentBlockDelta' in event:
                              delta = event['contentBlockDelta'].get('delta', {})
                              if 'text' in delta:
                                  full_response += delta['text']

                          if 'messageStop' in event:
                              stop_reason = event['messageStop'].get('stopReason')

                  # Return complete response
                  return {
                      'statusCode': 200,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*'
                      },
                      'body': json.dumps({
                          'response': full_response,
                          'stop_reason': stop_reason,
                          'model_id': model_id
                      })
                  }

              except ClientError as e:
                  error_code = e.response['Error']['Code']
                  error_message = e.response['Error']['Message']
                  print(f"Bedrock API error: {error_code} - {error_message}")
                  return {
                      'statusCode': 500,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({
                          'error': f"Bedrock API error: {error_code}",
                          'message': error_message
                      })
                  }
              except Exception as e:
                  print(f"Unexpected error: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': {'Content-Type': 'application/json'},
                      'body': json.dumps({
                          'error': 'Internal server error',
                          'message': str(e)
                      })
                  }

  LambdaUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref LambdaFunction
      AuthType: AWS_IAM
      Cors:
        AllowOrigins:
          - "*"
        AllowMethods:
          - "POST"
        AllowHeaders:
          - "content-type"
          - "x-amz-date"
          - "authorization"
          - "x-api-key"
          - "x-amz-security-token"

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaFunction.Arn
      FunctionUrlAuthType: AWS_IAM
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      # Note: For production, restrict Principal to specific IAM principals/roles

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LambdaFunction}"
      RetentionInDays: 7

Outputs:

  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LambdaFunction.Arn

  LambdaExecutionRoleArn:
    Description: Lambda Execution Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn

  LambdaFunctionUrl:
    Description: Lambda Function URL (requires AWS SigV4 authentication)
    Value: !GetAtt LambdaUrl.FunctionUrl

  BedrockModelId:
    Description: Bedrock Model ID in use
    Value: !Ref BedrockModelId
