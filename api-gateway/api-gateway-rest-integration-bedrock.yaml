AWSTemplateFormatVersion: "2010-09-09"
Description: "API Gateway REST - IAM Authorized - Lambda - Bedrock Converse API"

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      -
        Label:
          default: "API Gateway Configuration"
        Parameters:
          - ApiGatewayName
          - ResourceName
      -
        Label:
          default: "Bedrock Configuration"
        Parameters:
          - BedrockModelId

Parameters:

  ApiGatewayName:
    Type: "String"
    Default: "rest-bedrock-api"
    Description: "REST API Gateway Name"

  ResourceName:
    Description: Resource Name
    Type: String
    Default: "converse"

  BedrockModelId:
    Type: String
    Default: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
    Description: Bedrock model ID to use for Converse API

Resources:

# Lambda Resources

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      Description: "Lambda Service Role - Bedrock Converse"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      Policies:
        - PolicyName: BedrockInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource: "*"
      Tags:
        - Key: "Name"
          Value: "lambda-bedrock-service-role"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: "Lambda with Bedrock Converse API"
      Runtime: python3.12
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: index.handler
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      MemorySize: 512
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          from botocore.exceptions import ClientError

          bedrock_runtime = boto3.client('bedrock-runtime')

          def handler(event, context):
              """
              Lambda handler for API Gateway - Bedrock Converse API
              Expects JSON body with 'messages' array and optional 'system' prompt
              """
              try:
                  # Parse request body from API Gateway
                  if 'body' in event:
                      body = json.loads(event['body']) if isinstance(event['body'], str) else event['body']
                  else:
                      body = event

                  messages = body.get('messages', [])
                  system_prompt = body.get('system', '')
                  max_tokens = body.get('max_tokens', 1024)
                  temperature = min(max(float(body.get('temperature', 1.0)), 0.0), 1.0)

                  if not messages:
                      return {
                          'statusCode': 400,
                          'headers': {
                              'Content-Type': 'application/json',
                              'Access-Control-Allow-Origin': '*'
                          },
                          'body': json.dumps({'error': 'messages array is required'})
                      }

                  model_id = os.environ.get('BEDROCK_MODEL_ID')

                  # Prepare converse stream request
                  request_params = {
                      'modelId': model_id,
                      'messages': messages,
                      'inferenceConfig': {
                          'maxTokens': max_tokens,
                          'temperature': temperature
                      }
                  }

                  if system_prompt:
                      request_params['system'] = [{'text': system_prompt}]

                  # Call Bedrock Converse Stream API
                  response = bedrock_runtime.converse_stream(**request_params)

                  # Process streaming response
                  full_response = ""
                  stop_reason = None

                  stream = response.get('stream')
                  if stream:
                      for event in stream:
                          if 'contentBlockDelta' in event:
                              delta = event['contentBlockDelta'].get('delta', {})
                              if 'text' in delta:
                                  full_response += delta['text']

                          if 'messageStop' in event:
                              stop_reason = event['messageStop'].get('stopReason')

                  # Return complete response
                  return {
                      'statusCode': 200,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*'
                      },
                      'body': json.dumps({
                          'response': full_response,
                          'stop_reason': stop_reason,
                          'model_id': model_id
                      })
                  }

              except ClientError as e:
                  error_code = e.response['Error']['Code']
                  error_message = e.response['Error']['Message']
                  print(f"Bedrock API error: {error_code} - {error_message}")
                  return {
                      'statusCode': 500,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*'
                      },
                      'body': json.dumps({
                          'error': f"Bedrock API error: {error_code}",
                          'message': error_message
                      })
                  }
              except Exception as e:
                  print(f"Unexpected error: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*'
                      },
                      'body': json.dumps({
                          'error': 'Internal server error',
                          'message': str(e)
                      })
                  }
      TracingConfig:
        Mode: "Active"
      Tags:
        - Key: "name"
          Value: "lambda-bedrock-converse"

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LambdaFunction}"
      RetentionInDays: 7

# API Gateway Resources

  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      Description: "API Gateway CloudWatch Logs Role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs
      Tags:
        - Key: "Name"
          Value: "apigw-cloudwatch-role"

  ApiGatewayAccountConfig:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  ApiGatewayRestApi:
    Type: "AWS::ApiGateway::RestApi"
    Properties:
      Name: !Sub "${ApiGatewayName}"
      Description: !Sub "REST API ${ApiGatewayName} - IAM Authorized Bedrock Integration"
      DisableExecuteApiEndpoint: false
      Tags:
        - Key: "Environment"
          Value: "dev"

  ApiGatewayDeployment:
    Type: "AWS::ApiGateway::Deployment"
    DependsOn: ApiGatewayMethod
    Properties:
      RestApiId: !Ref ApiGatewayRestApi

  ApiGatewayStage:
    Type: "AWS::ApiGateway::Stage"
    DependsOn: ApiGatewayAccountConfig
    Properties:
      StageName: "prod"
      Description: "Production Stage"
      RestApiId: !Ref ApiGatewayRestApi
      DeploymentId: !Ref ApiGatewayDeployment
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          DataTraceEnabled: false
          MetricsEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt ApiLogGroup.Arn
        Format: "$context.identity.sourceIp,$context.identity.caller,$context.identity.user,$context.requestTime,$context.httpMethod,$context.resourcePath,$context.protocol,$context.status,$context.responseLength,$context.requestId"

  ApiGatewayResource:
    Type: "AWS::ApiGateway::Resource"
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId
      PathPart: !Ref ResourceName

  ApiGatewayMethod:
    Type: "AWS::ApiGateway::Method"
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: "POST"
      AuthorizationType: "AWS_IAM"
      Integration:
        Type: "AWS_PROXY"
        Uri: !Sub
          - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations"
          - LambdaArn: !GetAtt LambdaFunction.Arn
        IntegrationHttpMethod: "POST"
        PassthroughBehavior: WHEN_NO_MATCH
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty

  ApiInvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApi}/*/POST/${ResourceName}"

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: ApiGatewayRestApi
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${ApiGatewayRestApi}-access-logs"
      RetentionInDays: 7
      Tags:
        - Key: Environment
          Value: dev
        - Key: Application
          Value: bedrock-api

Outputs:

  InvokeURL:
    Description: "API Gateway Invoke URL (requires AWS SigV4 signing)"
    Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/${ResourceName}"

  ApiGatewayRestApiId:
    Description: "API Gateway REST API ID"
    Value: !Ref ApiGatewayRestApi

  LambdaFunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt LambdaFunction.Arn

  LambdaExecutionRoleArn:
    Description: "Lambda Execution Role ARN"
    Value: !GetAtt LambdaExecutionRole.Arn

  BedrockModelId:
    Description: "Bedrock Model ID in use"
    Value: !Ref BedrockModelId

  CurlExample:
    Description: "Example test command using AWS CLI"
    Value: !Sub "aws apigateway test-invoke-method --rest-api-id ${ApiGatewayRestApi} --resource-id ${ApiGatewayResource} --http-method POST --path-with-query-string /${ResourceName} --body '{\"messages\":[{\"role\":\"user\",\"content\":[{\"text\":\"Hello\"}]}]}'"