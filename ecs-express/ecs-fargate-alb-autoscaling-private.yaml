AWSTemplateFormatVersion: "2010-09-09"
Description: ECS Express — internal ALB + auto scaling + CloudFront VPC Origin — private subnets

# -----------------------------------------------------------------------------
# Summary
#   Deploys a containerised web service using AWS::ECS::ExpressGatewayService
#   into private subnets. ECS provisions an internal ALB. A CloudFront
#   distribution with a VPC Origin exposes the service to the internet over
#   HTTPS without giving the ALB or tasks a public IP.
#
# Resources created
#   - IAM Task Execution Role (pull images, write logs)
#   - IAM Infrastructure Role (ECS manages internal ALB, SGs, scaling on your behalf)
#   - AWS::ECS::ExpressGatewayService (internal ALB, tasks in private subnets)
#   - AWS::CloudFront::VpcOrigin (private connection from CloudFront to the internal ALB)
#   - AWS::CloudFront::Distribution (public HTTPS endpoint)
#
# Pre-requisites
#   - A VPC with private subnets in at least 2 AZs (no IGW in route table)
#   - A NAT Gateway so tasks can pull images from ECR / Docker Hub
#     (or use ECR with VPC endpoints to avoid NAT costs)
#   - VpcCidr of the VPC — needed to restrict ALB inbound to VPC traffic only
#
# Assumptions
#   - Subnets provided are private; ECS derives the VPC from them automatically
#   - ECS Express Mode provisions an internal ALB (not internet-facing) when
#     subnets have no IGW route
#   - CloudFront connects to the internal ALB via VPC Origin (no public IP on ALB)
#   - CloudFront viewer protocol: HTTPS only (HTTP redirected to HTTPS)
#   - No custom domain — uses the default *.cloudfront.net domain
#     Add a CloudFront alias + ACM certificate for a custom domain
#
# Traffic flow
#   Internet -> CloudFront (HTTPS) -> VPC Origin -> Internal ALB (HTTP) -> ECS tasks
#
# Security note
#   - Tasks have no public IPs; satisfies AWS Security Hub control [ECS.2]
# -----------------------------------------------------------------------------

Metadata:
  "AWS::CloudFormation::Interface":
    ParameterGroups:
      - Label:
          default: "Application"
        Parameters:
          - Application
          - Environment
      - Label:
          default: "Network — provide private subnets (no IGW route)"
        Parameters:
          - VpcSubnetList
      - Label:
          default: "Container"
        Parameters:
          - ContainerImageName
          - ContainerPort
          - TaskCpu
          - TaskMemory
      - Label:
          default: "Scaling"
        Parameters:
          - ScalingMinTaskCount
          - ScalingMaxTaskCount
          - ScalingTargetCpuPercent

# ---------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------
Parameters:

  Application:
    Type: String
    Default: myapp
    Description: Application name used as a prefix for all resources

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, stg, prod]
    Description: Deployment environment

  VpcSubnetList:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Private subnet IDs (min 2 AZs, no IGW route). VPC is derived automatically
      from the subnets — no VpcId parameter needed.

  ContainerImageName:
    Type: String
    Default: "public.ecr.aws/nginx/nginx:latest"
    Description: Docker image URI

  ContainerPort:
    Type: Number
    Default: 80
    Description: Port the container listens on

  TaskCpu:
    Type: String
    Default: "0.25"
    AllowedValues: ["0.25", "0.5", "1", "2", "4"]
    Description: Task vCPU allocation

  TaskMemory:
    Type: String
    Default: "0.5"
    AllowedValues: ["0.5", "1", "2", "4", "8"]
    Description: Task memory allocation (GB)

  ScalingMinTaskCount:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Minimum number of running tasks

  ScalingMaxTaskCount:
    Type: Number
    Default: 4
    MinValue: 1
    Description: Maximum number of running tasks

  ScalingTargetCpuPercent:
    Type: Number
    Default: 60
    MinValue: 10
    MaxValue: 100
    Description: Target average CPU utilization (%) for auto scaling

# ---------------------------------------------------------------
# Resources
# ---------------------------------------------------------------
Resources:

  # ---------------------------------------------------------------
  # IAM Roles
  # ---------------------------------------------------------------

  # Allows ECS to pull container images and write logs on behalf of the task
  ContainerTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Name
          Value: !Sub "${Application}-${Environment}-container-task-execution-role"

  # Allows ECS Express Mode to create and manage the internal ALB, security groups,
  # target groups, auto scaling policies, log groups, and CloudWatch alarms
  ExpressInfrastructureRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonECSInfrastructureRolePolicyForServiceConnectTransportLayerSecurity
      Tags:
        - Key: Name
          Value: !Sub "${Application}-${Environment}-express-infrastructure-role"

  # ---------------------------------------------------------------
  # ECS Express Service
  # ---------------------------------------------------------------

  # Private subnets trigger ECS to provision an internal ALB.
  # ECS derives the VPC from the subnet IDs — no VpcId needed.
  ExpressService:
    Type: AWS::ECS::ExpressGatewayService
    Properties:
      ServiceName: !Sub "${Application}-${Environment}"
      ExecutionRoleArn: !GetAtt ContainerTaskExecutionRole.Arn
      InfrastructureRoleArn: !GetAtt ExpressInfrastructureRole.Arn
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      HealthCheckPath: /
      NetworkConfiguration:
        Subnets: !Ref VpcSubnetList
        # SecurityGroups intentionally omitted — ECS creates and manages them
      PrimaryContainer:
        Image: !Ref ContainerImageName
        ContainerPort: !Ref ContainerPort
        # Uncomment to inject environment variables:
        # Environment:
        #   - Name: ENV
        #     Value: production
        # Uncomment to inject secrets from SSM / Secrets Manager:
        # Secrets:
        #   - Name: DB_PASSWORD
        #     ValueFrom: arn:aws:ssm:us-east-1:123456789012:parameter/myapp/db-password
      ScalingTarget:
        AutoScalingMetric: AVERAGE_CPU
        AutoScalingTargetValue: !Ref ScalingTargetCpuPercent
        MinTaskCount: !Ref ScalingMinTaskCount
        MaxTaskCount: !Ref ScalingMaxTaskCount
      Tags:
        - Key: Name
          Value: !Sub "${Application}-${Environment}-express-service"

  # ---------------------------------------------------------------
  # CloudFront VPC Origin + Distribution
  # ---------------------------------------------------------------

  # VPC Origin creates a private channel from CloudFront edge nodes into the VPC,
  # connecting directly to the internal ALB without needing a public IP on the ALB
  CloudFrontVpcOrigin:
    Type: AWS::CloudFront::VpcOrigin
    DependsOn: ExpressService
    Properties:
      VpcOriginEndpointConfig:
        Name: !Sub "${Application}-${Environment}-vpc-origin"
        Arn: !GetAtt ExpressService.ECSManagedResourceArns.IngressPath.LoadBalancerArn
        HTTPPort: 80
        HTTPSPort: 443
        OriginProtocolPolicy: http-only   # internal ALB listens on HTTP; TLS terminates at CloudFront

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${Application}-${Environment} via ECS Express internal ALB"
        Origins:
          - Id: express-internal-alb
            DomainName: !GetAtt ExpressService.ECSManagedResourceArns.IngressPath.LoadBalancerArn
            VpcOriginConfig:
              VpcOriginId: !Ref CloudFrontVpcOrigin
              OriginReadTimeout: 30
              OriginKeepaliveTimeout: 5
        DefaultCacheBehavior:
          TargetOriginId: express-internal-alb
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad       # CachingDisabled managed policy
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          Compress: true
        HttpVersion: http2
        IPV6Enabled: true
      Tags:
        - Key: Name
          Value: !Sub "${Application}-${Environment}-distribution"

# ---------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------
Outputs:

  CloudFrontUrl:
    Description: HTTPS public endpoint via CloudFront
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName

  ServiceArn:
    Value: !GetAtt ExpressService.ServiceArn

  LoadBalancerArn:
    Description: ARN of the internal ALB auto-provisioned by ECS Express (VPC-internal only)
    Value: !GetAtt ExpressService.ECSManagedResourceArns.IngressPath.LoadBalancerArn
