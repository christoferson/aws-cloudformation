AWSTemplateFormatVersion: 2010-09-09
Description: Lake Formation tutorial for row/cell level security

Parameters:
  ManagerPassword:
    Type: String
    ConstraintDescription: "it must contain at least 8 characters and Include a minimum of three of the following mix of character types: uppercase, lowercase, numbers, and ! @ # $ % ^ & * ( ) _ + - = [ ] { } | ' "
    Description: "Password for user - lf-rls-blog-manager ; it must contain at least 8 characters and include a minimum of three of the following mix of character types: uppercase, lowercase, numbers, and ! @ # $ % ^ & * ( ) _ + - = [ ] { } | '  "
    MaxLength: 128
    MinLength: 8
    NoEcho: true
  USAnalystPassword:
    Type: String
    ConstraintDescription: "it must contain at least 8 characters and Include a minimum of three of the following mix of character types: uppercase, lowercase, numbers, and ! @ # $ % ^ & * ( ) _ + - = [ ] { } | ' "
    Description: "Password for  user - lf-rls-blog-analyst-us ; it must contain at least 8 characters and include a minimum of three of the following mix of character types: uppercase, lowercase, numbers, and ! @ # $ % ^ & * ( ) _ + - = [ ] { } | '  "
    MaxLength: 128
    MinLength: 8
    NoEcho: true
  CanadaAnalystPassword:
    Type: String
    ConstraintDescription: "it must contain at least 8 characters and Include a minimum of three of the following mix of character types: uppercase, lowercase, numbers, and ! @ # $ % ^ & * ( ) _ + - = [ ] { } | ' "
    Description: "Password for user - lf-rls-blog-analyst-ca ; it must contain at least 8 characters and include a minimum of three of the following mix of character types: uppercase, lowercase, numbers, and ! @ # $ % ^ & * ( ) _ + - = [ ] { } | '  "
    MaxLength: 128
    MinLength: 8
    NoEcho: true
Outputs:
  BucketName:
    Value:
      Ref: DataLakeBucket
Resources:
  DataLakeBucket:
    Type: AWS::S3::Bucket
    UpdateReplacePolicy: Delete
    DeletionPolicy: Delete
  IamRoleLambdaBasicExec:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
        Version: "2012-10-17"
      ManagedPolicyArns:
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyDocument:
          Version: '2012-10-17'
          Statement:
          -
            Effect: "Allow"
            Action:
              - s3:GetObject
            Resource: 
              - 'arn:aws:s3:::aws-bigdata-blog/*'
          -
            Effect: "Allow"
            Action:
              - s3:ListBucket
            Resource: 
              - 'arn:aws:s3:::aws-bigdata-blog'
        PolicyName: 'AWSLambda-S3-Policy'
  IamRoleLambdaDefaultPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
          - Action:
              - s3:GetObject*
              - s3:GetBucket*
              - s3:List*
              - s3:DeleteObject*
              - s3:PutObject*
              - s3:Abort*
            Effect: Allow
            Resource:
              - Fn::GetAtt:
                  - DataLakeBucket
                  - Arn
              - Fn::Join:
                  - ""
                  - - Fn::GetAtt:
                        - DataLakeBucket
                        - Arn
                    - /*
        Version: "2012-10-17"
      PolicyName: IamRoleLambdaDefaultPolicy
      Roles:
        - Ref: IamRoleLambdaBasicExec
  S3CustomResource:
      Type: Custom::S3CustomResource
      Properties:
        ServiceToken: 
          Fn::GetAtt: LambdaFunctionUploadingSampleData.Arn
        SourceBucketName: 'aws-bigdata-blog'
        SourceDataFilePath: 'artifacts/lakeformation_cell_row_security/RowLevelFilertingBlog.csv'
        DestinationBucketName:
          Ref: DataLakeBucket
        DestinationDataFilePath: 'datafiles/customers/RowLevelFilertingBlog.csv'
  LambdaFunctionUploadingSampleData:
    Type: AWS::Lambda::Function
    Properties:
      Code:
        ZipFile: |
          import boto3
          from botocore.client import ClientError
          import cfnresponse
          s3_client = boto3.client('s3')

          def on_event(event, context):
            sourceBucketName = event['ResourceProperties']['SourceBucketName'].strip()
            sourceDataFilePath = event['ResourceProperties']['SourceDataFilePath'].strip()
            destinationBucketName = event['ResourceProperties']['DestinationBucketName'].strip()
            destinationDataFilePath = event['ResourceProperties']['DestinationDataFilePath'].strip()
            print(event)
            request_type = event['RequestType']
            response_data = {}

            try:
              if request_type == 'Create' or request_type == 'Update':
                print("Inside PutObject")
                s3_client.put_object(Bucket=destinationBucketName,Body='',Key='anthenaqueryresults/' )
                try:
                  copy_source = {'Bucket': sourceBucketName, 'Key': sourceDataFilePath}
                  s3_client.copy_object(CopySource=copy_source, Bucket=destinationBucketName, Key=destinationDataFilePath)
                except ClientError as ce:
                    print(f"Failed to create/update the files: {ce}")
              elif request_type == 'Delete': 
                print("inside delete event")
                try:
                  s3_client.delete_object(Bucket=destinationBucketName,Key='anthenaqueryresults/')
                  s3_client.delete_object(Bucket=destinationBucketName,Key=destinationDataFilePath)
                except ClientError as ce:
                    print(f"Failed to delete the files: {ce}")
              else:
                raise Exception("Invalid request type: %s" % request_type)

              print("Completed.")
              cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
            except Exception as e:
              print(f"Failed...")
              print(str(e))
              response_data['Data'] = str(e)
              cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
      Role:
        Fn::GetAtt:
          - IamRoleLambdaBasicExec
          - Arn
      Handler: index.on_event
      Runtime: python3.8
      Timeout: 300
    DependsOn:
      - IamRoleLambdaDefaultPolicy
      - IamRoleLambdaBasicExec
  IamUsersLfBlogPolicyDocument:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Statement:
          - Effect: Allow
            Action:
              - lakeformation:PlanQuery
              - lakeformation:StartQueryPlanning
              - lakeformation:GetQueryState
              - lakeformation:GetWorkUnits
              - lakeformation:Execute
              - lakeformation:GetWorkUnitResults
            Resource: "*"
          - Effect: Allow
            Action:
              - s3:GetObject*
              - s3:GetBucket*
              - s3:List*
              - s3:DeleteObject*
              - s3:PutObject*
              - s3:Abort*
            Resource:
              - Fn::GetAtt:
                  - DataLakeBucket
                  - Arn
              - Fn::Join:
                  - ""
                  - - Fn::GetAtt:
                        - DataLakeBucket
                        - Arn
                    - /anthenaqueryresults/*
        Version: "2012-10-17"
      Description: ""
      Groups:
        - Ref: IamGroupLfBlog
      Path: /
  IamUserDlManager:
    Type: AWS::IAM::User
    Properties:
      Groups:
        - Ref: IamGroupLfBlog
      LoginProfile:
        Password:
          Ref: ManagerPassword
      ManagedPolicyArns:
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/AmazonAthenaFullAccess
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/AWSGlueConsoleFullAccess
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/AWSLakeFormationDataAdmin
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/CloudWatchLogsReadOnlyAccess
      UserName: lf-rls-blog-manager
  IamUserDataAnalystUs:
    Type: AWS::IAM::User
    Properties:
      Groups:
        - Ref: IamGroupLfBlog
      LoginProfile:
        Password:
          Ref: USAnalystPassword
      ManagedPolicyArns:
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/AmazonAthenaFullAccess
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/AWSGlueConsoleFullAccess
      UserName: lf-rls-blog-analyst-us
  IamUserDataAnalystCa:
    Type: AWS::IAM::User
    Properties:
      Groups:
        - Ref: IamGroupLfBlog
      LoginProfile:
        Password:
          Ref: CanadaAnalystPassword
      ManagedPolicyArns:
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/AmazonAthenaFullAccess
        - Fn::Join:
            - ""
            - - "arn:"
              - Ref: AWS::Partition
              - :iam::aws:policy/AWSGlueConsoleFullAccess
      UserName: lf-rls-blog-analyst-ca
  IamGroupLfBlog:
    Type: AWS::IAM::Group
  LakeFormationDataLakeLocation:
    Type: AWS::LakeFormation::Resource
    Properties:
      ResourceArn:
        Fn::GetAtt:
          - DataLakeBucket
          - Arn
      UseServiceLinkedRole: true
  LakeFormationDataLakeSettings:
    Type: AWS::LakeFormation::DataLakeSettings
    Properties:
      Admins:
        - DataLakePrincipalIdentifier:
            Fn::GetAtt:
              - IamUserDlManager
              - Arn
    DependsOn:
      - IamUserDlManager
