AWSTemplateFormatVersion: "2010-09-09"
Description: Application Load Balancer - Path-Based Routing to Lambda Functions

# ================================================================================================
# ALB PATH-BASED ROUTING STUDY GUIDE
# ================================================================================================
#
# OVERVIEW:
# This template demonstrates path-based routing using Application Load Balancer (ALB).
# Traffic is routed to different Lambda functions based on the URL path.
#
# ARCHITECTURE:
#   Internet → ALB (Port 80) → Listener → Rules → Target Groups → Lambda Functions
#                                  ↓
#                           /v1/lambda1 → Lambda 1
#                           /v1/lambda2 → Lambda 2
#                           Other paths → 404 Fixed Response
#
# KEY CONCEPTS:
#
# 1. Application Load Balancer (ALB)
#    - Operates at Layer 7 (HTTP/HTTPS)
#    - Content-based routing (path, host, headers, query strings)
#    - Supports Lambda, EC2 instances, IP addresses, and containers as targets
#
# 2. Listeners
#    - Process that checks for connection requests on specified protocol:port
#    - Each ALB needs at least one listener (this template: HTTP on port 80)
#    - Evaluates rules in priority order and executes default action if no match
#
# 3. Listener Rules
#    - Define routing logic based on conditions
#    - Priority: Lower number = evaluated first (Priority 1 before Priority 2)
#    - Conditions: path-pattern, host-header, http-header, query-string, etc.
#    - Actions: forward, redirect, fixed-response, authenticate-cognito/oidc
#
# 4. Path-Based Routing
#    - Routes traffic based on URL path pattern
#    - Wildcards supported: /api/*, /images/*.jpg
#    - Use cases: Microservices, API versioning, content type routing
#
# 5. Target Groups
#    - Logical grouping of targets (Lambda, instances, IPs)
#    - One protocol:port per target group
#    - Performs health checks on targets
#    - Target Types:
#      * lambda: Lambda function ARN (used in this template)
#      * instance: EC2 instance IDs
#      * ip: IP addresses (VPC or on-premises)
#
# 6. Lambda as Target
#    - ALB invokes Lambda synchronously
#    - Must grant elasticloadbalancing.amazonaws.com permission via AWS::Lambda::Permission
#    - Lambda receives ALB-specific event format with request details
#    - Response must include: statusCode, statusDescription, headers, body
#    - Use AvailabilityZone: "all" when registering Lambda
#
# 7. Multi-Value Headers
#    - Enabled via TargetGroupAttributes: lambda.multi_value_headers.enabled
#    - Allows Lambda to return multiple values for same header name
#    - Example: Set-Cookie with multiple values
#
# ROUTING LOGIC:
#   Request: http://alb-domain/v1/lambda1
#     → ListenerRule1 (Priority 1, path-pattern: /v1/lambda1)
#     → TargetGroup1 → Lambda Function 1
#
#   Request: http://alb-domain/v1/lambda2
#     → ListenerRule2 (Priority 2, path-pattern: /v1/lambda2)
#     → TargetGroup2 → Lambda Function 2
#
#   Request: http://alb-domain/other
#     → No rule matches
#     → Default action: 404 Fixed Response
#
# SECURITY:
#   - Security Group: Allows HTTP (port 80) from 0.0.0.0/0
#   - Lambda Permissions: elasticloadbalancing.amazonaws.com can invoke
#   - Production: Use HTTPS (port 443) with ACM certificate
#
# PREREQUISITES:
#   - VPC with at least 2 public subnets in different Availability Zones
#   - Internet Gateway attached to VPC
#   - Route table for public subnets
#
# TESTING:
#   # Get ALB DNS name from stack outputs
#   ALB_DNS=$(aws cloudformation describe-stacks --stack-name alb-path-pattern \
#     --query 'Stacks[0].Outputs[?OutputKey==`LoadBalancerDomainName`].OutputValue' \
#     --output text)
#
#   # Test Lambda 1
#   curl http://$ALB_DNS/v1/lambda1
#   # Expected: "Greetings Lambda 1: <timestamp>"
#
#   # Test Lambda 2
#   curl http://$ALB_DNS/v1/lambda2
#   # Expected: "Greetings Lambda 2: <timestamp>"
#
#   # Test 404 response
#   curl http://$ALB_DNS/unknown
#   # Expected: "Not Found." (404)
#
# COST:
#   - ALB: ~$16-$23/month + LCU charges based on traffic
#   - Lambda: First 1M requests free, then $0.20 per 1M requests
#   - CloudWatch Logs: Minimal for low traffic
#
# COMMON ERRORS:
#   1. "Target health check failed"
#      - Lambda permission not granted (check AWS::Lambda::Permission)
#      - Wrong SourceArn in permission
#
#   2. "No targets available"
#      - TargetGroup created before LambdaPermission
#      - Use DependsOn: LambdaPermission
#
#   3. "503 Service Unavailable"
#      - All targets unhealthy
#      - Check CloudWatch logs for Lambda errors
#
# ================================================================================================

Metadata:
  "AWS::CloudFormation::Interface":
    ParameterGroups:
      - Label: 
          default: "Load Balancer Configuration"
        Parameters: 
          - VpcId
          - VpcSubnetListLoadBalancer

Parameters:

  VpcId:
    Description: "VPC ID"
    Type: AWS::EC2::VPC::Id

  VpcSubnetListLoadBalancer:
    Description: "Public VpcSubnets for Load Balancer"
    Type: List<AWS::EC2::Subnet::Id>

Resources:

  # Backing Lambda Function - Called via the Load Balancer

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess

  LambdaFunction1:
    Type: AWS::Lambda::Function
    Properties:
      Description: "Lambda1"
      Runtime: nodejs20.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: index.handler
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              console.log(event);
              let now = new Date();
              const response = {
                  statusCode: 200,
                  statusDescription: "200 OK",
                  isBase64Encoded: false,
                  headers: {
                      "Content-Type": "text/html; charset=utf-8" 
                  },
                  "multiValueHeaders": {
                      "Content-Type": ["text/html; charset=utf-8"]
                  },
                  body: `<html><body><p>Greetings Lambda 1: ${now}</p></body></html>`,
              };
              return response;
          };
      TracingConfig:
        Mode: "Active"

  LambdaPermission1:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaFunction1.Arn
      Action: lambda:InvokeFunction
      Principal: "elasticloadbalancing.amazonaws.com"
      SourceArn: !Sub "arn:${AWS::Partition}:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:*"

  LambdaLogGroup1:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LambdaFunction1}"
      RetentionInDays: 1

  # 

  LambdaFunction2:
    Type: AWS::Lambda::Function
    Properties:
      Description: "Lambda1"
      Runtime: nodejs20.x
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: index.handler
      Code:
        ZipFile: |
          exports.handler = async (event) => {
              console.log(event);
              let now = new Date();
              const response = {
                  statusCode: 200,
                  statusDescription: "200 OK",
                  isBase64Encoded: false,
                  headers: {
                      "Content-Type": "text/html; charset=utf-8" 
                  },
                  "multiValueHeaders": {
                      "Content-Type": ["text/html; charset=utf-8"]
                  },
                  body: `<html><body><p>Greetings Lambda 2: ${now}</p></body></html>`,
              };
              return response;
          };
      TracingConfig:
        Mode: "Active"

  LambdaPermission2:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaFunction2.Arn
      Action: lambda:InvokeFunction
      Principal: "elasticloadbalancing.amazonaws.com"
      SourceArn: !Sub "arn:${AWS::Partition}:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:*"

  LambdaLogGroup2:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LambdaFunction2}"
      RetentionInDays: 1

  # Load Balancer definition

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow http on port 80
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing 
      Subnets: !Ref VpcSubnetListLoadBalancer
      SecurityGroups: [!Ref LoadBalancerSecurityGroup]
      Tags:
        - Key: Name
          Value: "route53-elb-http"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: 404
            MessageBody: <html>Not Found.</html>
            ContentType: text/html

# DNS

  # Route53RecordSetGroup:
  #   Type: AWS::Route53::RecordSetGroup
  #   Properties:
  #     HostedZoneName: !Sub "${HostedZoneName}"
  #     Comment: "Alias targeted to Application LoadBalancer"
  #     RecordSets:
  #     - Name: !Sub "${LoadBalancerSubDomainName}.${HostedZoneName}"
  #       Type: A
  #       AliasTarget:
  #         HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID
  #         DNSName: !GetAtt LoadBalancer.DNSName

# Backend Paths - Points to Lambda

  TargetGroup1:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: LambdaPermission1
    Properties:
      TargetType: lambda
      Targets:
        - Id: !GetAtt LambdaFunction1.Arn
          AvailabilityZone: "all"
      TargetGroupAttributes: 
        - Key: lambda.multi_value_headers.enabled
          Value: true

  ListenerRule1:
    Type: "AWS::ElasticLoadBalancingV2::ListenerRule"
    Properties:
      Priority: "1"
      ListenerArn: !Ref HttpListener
      Conditions:
        - Field: "path-pattern" #host-header
          Values:
            - "/v1/lambda1"
      Actions:
        - Type: "forward"
          TargetGroupArn: !Ref TargetGroup1
          Order: 1
          ForwardConfig:
            TargetGroups:
              - TargetGroupArn: !Ref TargetGroup1
                Weight: 1
            TargetGroupStickinessConfig:
              Enabled: false


  TargetGroup2:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: LambdaPermission2
    Properties:
      TargetType: lambda
      Targets:
        - Id: !GetAtt LambdaFunction2.Arn
          AvailabilityZone: "all"
      TargetGroupAttributes: 
        - Key: lambda.multi_value_headers.enabled
          Value: true

  ListenerRule2:
    Type: "AWS::ElasticLoadBalancingV2::ListenerRule"
    Properties:
      Priority: "2"
      ListenerArn: !Ref HttpListener
      Conditions:
        - Field: "path-pattern" #host-header
          Values:
            - "/v1/lambda2"
      Actions:
        - Type: "forward"
          TargetGroupArn: !Ref TargetGroup2
          Order: 1
          ForwardConfig:
            TargetGroups:
              - TargetGroupArn: !Ref TargetGroup2
                Weight: 1
            TargetGroupStickinessConfig:
              Enabled: false

Outputs:

  LambdaFunction1Arn:
    Value: !GetAtt LambdaFunction1.Arn

  LambdaFunction2Arn:
    Value: !GetAtt LambdaFunction2.Arn

  LambdaExecutionRoleArn:
    Value: !GetAtt LambdaExecutionRole.Arn

  LoadBalancerDomainName:
    Value: !GetAtt LoadBalancer.DNSName

  LoadBalancerUrlHttp1:
    Value: !Sub "http://${LoadBalancer.DNSName}/v1/lambda1"

  LoadBalancerUrlHttp2:
    Value: !Sub "http://${LoadBalancer.DNSName}/v1/lambda2"